<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Corporate Primary Gradient -->
    <linearGradient id="brandBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540" />
      <stop offset="100%" stop-color="#0D6EFD" />
    </linearGradient>
    
    <!-- Kinetic Flight Gradient -->
    <linearGradient id="flightAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF512F" />
      <stop offset="100%" stop-color="#F09819" />
    </linearGradient>
    
    <!-- Z-Axis Depth Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0A2540" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Base Letter 'D' with Counter-Clockwise Outer Path and Clockwise Inner Path -->
  <path d="M 140 100 
           V 412 
           H 260 
           A 156 156 0 0 0 260 100 
           Z 
           M 216 176 
           H 260 
           A 80 80 0 0 1 260 336 
           H 216 
           Z" 
        fill="url(#brandBlue)" 
        filter="url(#shadow)"/>

  <!-- Ascent Trajectory Arc -->
  <path d="M 60 380 
           C 120 200, 300 120, 440 180" 
        fill="none" 
        stroke="url(#flightAccent)" 
        stroke-width="32" 
        stroke-linecap="round" />
        
  <!-- Delta Aircraft Arrowhead -->
  <polygon points="420,140 480,195 405,205" fill="#F09819" filter="url(#shadow)" />
</svg>
